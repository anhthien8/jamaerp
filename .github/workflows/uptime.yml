name: Uptime check

# Canh production Railway mỗi 10 phút — sập thì báo Telegram.
# Cần 2 GitHub Secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN     — token bot (giống backend)
#   TELEGRAM_ALERT_CHAT_ID — chat id nhận cảnh báo (admin hoặc nhóm kỹ thuật)
# Thiếu secrets thì job vẫn chạy nhưng chỉ log, không gửi.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend /health
        id: ping
        run: |
          set +e
          code=$(curl -s --max-time 20 -o /tmp/body -w "%{http_code}" \
            "https://jama-crm-prod-production.up.railway.app/health")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "HTTP $code"; cat /tmp/body || true
          if [ "$code" = "200" ]; then exit 0; else exit 1; fi

      - name: Ping frontend
        id: ping_fe
        if: always()
        run: |
          set +e
          code=$(curl -s --max-time 20 -o /dev/null -w "%{http_code}" \
            "https://frontend-jet-two-86.vercel.app/login")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "HTTP $code"
          if [ "$code" = "200" ]; then exit 0; else exit 1; fi

      - name: Báo Telegram khi sập
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Thiếu TELEGRAM_BOT_TOKEN / TELEGRAM_ALERT_CHAT_ID — bỏ qua gửi cảnh báo."
            exit 0
          fi
          BE="${{ steps.ping.outputs.code || 'ERR' }}"
          FE="${{ steps.ping_fe.outputs.code || 'ERR' }}"
          TEXT="🚨 JAMA ERP sập! Backend Railway: HTTP ${BE} · Frontend Vercel: HTTP ${FE}. Kiểm tra ngay: https://railway.com"
          curl -s --max-time 15 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" -d text="${TEXT}" > /dev/null
